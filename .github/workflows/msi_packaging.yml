name: Unlimotion msiPkg

on:
  release:
    types:
      - published

permissions:
  contents: write

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  WINDOWS_PUBLISH_DIR: ${{ github.workspace }}\src\Unlimotion.Desktop\bin\Release\net10.0\win-x64\publish
  WINDOWS_PORTABLE_DIR: ${{ github.workspace }}\artifacts\windows-portable
  WINDOWS_PORTABLE_ZIP: ${{ github.workspace }}\artifacts\windows-portable\Unlimotion-${{ github.ref_name }}-win-x64-portable.zip

jobs:
  advinst-aip-build:
    runs-on: windows-2022

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        ref: ${{ github.sha }}

    - name: Setup .NET 10 SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x
        
    - name: Publish
      run: dotnet publish src\Unlimotion.Desktop\Unlimotion.Desktop.csproj -c Release -f net10.0 -r win-x64 -o "${{ env.WINDOWS_PUBLISH_DIR }}" -p:PublishSingleFile=true --self-contained true -p:IncludeNativeLibrariesForSelfExtract=true -p:DebugType=None -p:DebugSymbols=false -p:Version=${{  github.ref_name }} --ignore-failed-sources

    - name: Create Portable Zip
      shell: pwsh
      run: |
        if (-not (Test-Path -LiteralPath "${{ env.WINDOWS_PUBLISH_DIR }}")) {
          throw "Windows publish directory was not created: ${{ env.WINDOWS_PUBLISH_DIR }}"
        }

        New-Item -ItemType Directory -Force -Path "${{ env.WINDOWS_PORTABLE_DIR }}" | Out-Null

        if (Test-Path -LiteralPath "${{ env.WINDOWS_PORTABLE_ZIP }}") {
          Remove-Item -LiteralPath "${{ env.WINDOWS_PORTABLE_ZIP }}" -Force
        }

        Compress-Archive -Path (Join-Path -Path "${{ env.WINDOWS_PUBLISH_DIR }}" -ChildPath '*') -DestinationPath "${{ env.WINDOWS_PORTABLE_ZIP }}" -Force

        if (-not (Test-Path -LiteralPath "${{ env.WINDOWS_PORTABLE_ZIP }}")) {
          throw "Portable zip was not created: ${{ env.WINDOWS_PORTABLE_ZIP }}"
        }

    - name: Build AIP
      uses: caphyon/advinst-github-action@v1.0
      with:
        advinst-version: '20.3.2'
        advinst-enable-automation: 'true'
        aip-path: ${{ github.workspace }}\Unlimotion.aip
        aip-build-name: DefaultBuild
        aip-package-name: Unlimotion-${{  github.ref_name }}.msi
        aip-output-dir:  ${{ github.workspace }}\setup
        aip-commands: |
          SetProperty FOO="foo"
          SetVersion ${{  github.ref_name }}

    - name: Upload MsiPkg to Release
      uses: xresloader/upload-to-github-release@v1.3.11
      with:
        file: ${{ github.workspace }}\setup\Unlimotion-${{  github.ref_name }}.msi
        tags: true

    - name: Upload Portable Zip to Release
      uses: xresloader/upload-to-github-release@v1.3.11
      with:
        file: ${{ env.WINDOWS_PORTABLE_ZIP }}
        tags: true
