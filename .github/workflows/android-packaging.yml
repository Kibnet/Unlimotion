name: Unlimotion AndroidPkg

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
  release:
    types:
      - published

permissions:
  contents: write

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  ANDROID_API_LEVEL: 24
  ANDROID_PLATFORM: android-36
  ANDROID_BUILD_TOOLS: 35.0.0
  ANDROID_NDK_VERSION: 27.2.12479018
  OPENSSL_VERSION: 3.0.14
  LIBSSH2_VERSION: 1.11.1
  LIBGIT2_NATIVE_PACKAGE_VERSION: 2.0.324-android.7

jobs:
  android-build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        ref: ${{ github.sha }}
        submodules: recursive

    - name: Setup .NET 10 SDK
      uses: actions/setup-dotnet@v4
      with:
        global-json-file: global.json

    - name: Setup Java 17
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: "17"

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Install Android SDK Packages
      run: |
        yes | sdkmanager --licenses > /dev/null
        sdkmanager --install \
          "platform-tools" \
          "build-tools;${ANDROID_BUILD_TOOLS}" \
          "platforms;${ANDROID_PLATFORM}" \
          "ndk;${ANDROID_NDK_VERSION}"
        echo "ANDROID_NDK_ROOT=${ANDROID_SDK_ROOT}/ndk/${ANDROID_NDK_VERSION}" >> "$GITHUB_ENV"

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential cmake ninja-build perl zip unzip

    - name: Install .NET Android Workload
      run: dotnet workload install android --skip-manifest-update

    - name: Prepare Local Android Feed
      run: |
        mkdir -p artifacts/android artifacts/android-native artifacts/nuget-local

    - name: Resolve Android Native Cache Key
      id: android_native_cache_key
      shell: bash
      run: |
        echo "libgit2_sha=$(git -C .native/libgit2-src rev-parse HEAD)" >> "$GITHUB_OUTPUT"

    - name: Cache Android Native Dependencies
      uses: actions/cache@v4
      with:
        path: |
          artifacts/android-native
          artifacts/nuget-local
        key: android-native-${{ runner.os }}-ndk-${{ env.ANDROID_NDK_VERSION }}-openssl-${{ env.OPENSSL_VERSION }}-libssh2-${{ env.LIBSSH2_VERSION }}-libgit2pkg-${{ env.LIBGIT2_NATIVE_PACKAGE_VERSION }}-libgit2-${{ steps.android_native_cache_key.outputs.libgit2_sha }}-${{ hashFiles('scripts/android-native-common.sh', 'scripts/build-openssl-android.sh', 'scripts/build-libssh2-android.sh', 'scripts/build-libgit2-android.sh', 'scripts/pack-libgit2sharp-nativebinaries-android.sh') }}

    - name: Cache NuGet Packages
      uses: actions/cache@v4
      with:
        path: ~/.nuget/packages
        key: nuget-${{ runner.os }}-sdk-${{ hashFiles('global.json') }}-projects-${{ hashFiles('src/Directory.Packages.props', 'src/nuget.config', 'src/**/*.csproj') }}-native-${{ env.ANDROID_NDK_VERSION }}-${{ env.OPENSSL_VERSION }}-${{ env.LIBSSH2_VERSION }}-${{ env.LIBGIT2_NATIVE_PACKAGE_VERSION }}-${{ steps.android_native_cache_key.outputs.libgit2_sha }}-${{ hashFiles('scripts/android-native-common.sh', 'scripts/build-openssl-android.sh', 'scripts/build-libssh2-android.sh', 'scripts/build-libgit2-android.sh', 'scripts/pack-libgit2sharp-nativebinaries-android.sh') }}

    - name: Resolve Android App Version
      id: android_version
      shell: bash
      run: |
        display_version="1.0"
        if [ "${GITHUB_EVENT_NAME}" = "release" ]; then
          display_version="${GITHUB_REF_NAME#v}"

          if [[ ! "$display_version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tag '${GITHUB_REF_NAME}' cannot be used by the current Android workflow. Use numeric SemVer tags like 1.2.3 or v1.2.3." >&2
            exit 1
          fi

          if [[ "$display_version" == "0.0.0" ]]; then
            echo "Release tag '${GITHUB_REF_NAME}' cannot be used as an Android application version. Use 0.0.1 or greater." >&2
            exit 1
          fi
        fi

        version_code="${GITHUB_RUN_NUMBER}"
        if [[ ! "$version_code" =~ ^[0-9]+$ ]] || [ "$version_code" -lt 1 ]; then
          version_code="1"
        fi

        echo "display_version=$display_version" >> "$GITHUB_OUTPUT"
        echo "version_code=$version_code" >> "$GITHUB_OUTPUT"

    - name: Prepare Android Release Signing
      if: github.event_name == 'release'
      shell: bash
      env:
        ANDROID_SIGNING_KEYSTORE_BASE64: ${{ secrets.ANDROID_SIGNING_KEYSTORE_BASE64 }}
        ANDROID_SIGNING_STORE_PASS: ${{ secrets.ANDROID_SIGNING_STORE_PASS }}
        ANDROID_SIGNING_KEY_ALIAS: ${{ secrets.ANDROID_SIGNING_KEY_ALIAS }}
        ANDROID_SIGNING_KEY_PASS: ${{ secrets.ANDROID_SIGNING_KEY_PASS }}
      run: |
        missing=0
        for name in ANDROID_SIGNING_KEYSTORE_BASE64 ANDROID_SIGNING_STORE_PASS ANDROID_SIGNING_KEY_ALIAS ANDROID_SIGNING_KEY_PASS; do
          if [ -z "${!name}" ]; then
            echo "Missing required release signing secret: $name" >&2
            missing=1
          fi
        done

        if [ "$missing" -ne 0 ]; then
          exit 1
        fi

        signing_dir="${RUNNER_TEMP}/android-signing"
        mkdir -p "$signing_dir"
        signing_keystore="${signing_dir}/unlimotion-release.keystore"
        printf '%s' "$ANDROID_SIGNING_KEYSTORE_BASE64" | base64 --decode > "$signing_keystore"

        echo "ANDROID_SIGNING_KEYSTORE=$signing_keystore" >> "$GITHUB_ENV"

    - name: Build Android Native Dependencies
      run: |
        expected_package="artifacts/nuget-local/LibGit2Sharp.NativeBinaries.${LIBGIT2_NATIVE_PACKAGE_VERSION}.nupkg"
        if [ -f "$expected_package" ]; then
          echo "Using cached Android native package: $expected_package"
        else
          for abi in arm64-v8a x86_64; do
            export ANDROID_ABI="$abi"
            bash ./scripts/build-openssl-android.sh
            bash ./scripts/build-libssh2-android.sh
            bash ./scripts/build-libgit2-android.sh
          done
          export ANDROID_ABIS="arm64-v8a x86_64"
          bash ./scripts/pack-libgit2sharp-nativebinaries-android.sh
        fi

    - name: Build Android APKs
      env:
        ANDROID_SIGNING_STORE_PASS: ${{ secrets.ANDROID_SIGNING_STORE_PASS }}
        ANDROID_SIGNING_KEY_ALIAS: ${{ secrets.ANDROID_SIGNING_KEY_ALIAS }}
        ANDROID_SIGNING_KEY_PASS: ${{ secrets.ANDROID_SIGNING_KEY_PASS }}
      run: |
        validate_runtime_symbols() {
          local apk_path="$1"
          local abi="$2"
          local readelf="${ANDROID_NDK_ROOT}/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-readelf"
          local tmp_dir
          local missing=0

          for native_library in \
            libgit2-3f4182d.so \
            libssl.so \
            libssl.so.3 \
            libcrypto.so \
            libcrypto.so.3 \
            libssh2.so; do
            if ! unzip -l "$apk_path" "lib/${abi}/${native_library}" >/dev/null 2>&1; then
              echo "APK ${apk_path} is missing native library lib/${abi}/${native_library}." >&2
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

          if [ ! -x "$readelf" ]; then
            echo "llvm-readelf not found at $readelf" >&2
            exit 1
          fi

          tmp_dir="$(mktemp -d)"
          unzip -p "$apk_path" "lib/${abi}/libmonodroid.so" > "$tmp_dir/libmonodroid.so"
          unzip -p "$apk_path" "lib/${abi}/libxamarin-app.so" > "$tmp_dir/libxamarin-app.so"

          local monodroid_symbols="$tmp_dir/libmonodroid.symbols.txt"
          local xamarin_app_symbols="$tmp_dir/libxamarin-app.symbols.txt"
          "$readelf" --dyn-symbols "$tmp_dir/libmonodroid.so" > "$monodroid_symbols"
          "$readelf" --dyn-symbols "$tmp_dir/libxamarin-app.so" > "$xamarin_app_symbols"

          for symbol in \
            compressed_assembly_count \
            compressed_assembly_descriptors \
            uncompressed_assemblies_data_size \
            uncompressed_assemblies_data_buffer; do
            if grep -Eq "[[:space:]]UND[[:space:]]+${symbol}$" "$monodroid_symbols" &&
               ! grep -Eq "[[:space:]]GLOBAL[[:space:]]+DEFAULT[[:space:]]+[0-9]+[[:space:]]+${symbol}$" "$xamarin_app_symbols"; then
              echo "Android runtime symbol '${symbol}' is required by libmonodroid.so but missing from libxamarin-app.so in ${apk_path}." >&2
              missing=1
            fi
          done

          rm -rf "$tmp_dir"
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi
        }

        for rid in android-arm64 android-x64; do
          build_args=()
          if [ "${GITHUB_EVENT_NAME}" = "release" ]; then
            build_args+=(
              -p:AndroidKeyStore=true
              -p:AndroidSigningKeyStore="${ANDROID_SIGNING_KEYSTORE}"
              -p:AndroidSigningStorePass="${ANDROID_SIGNING_STORE_PASS}"
              -p:AndroidSigningKeyAlias="${ANDROID_SIGNING_KEY_ALIAS}"
              -p:AndroidSigningKeyPass="${ANDROID_SIGNING_KEY_PASS}"
            )
          fi

          dotnet build src/Unlimotion.Android/Unlimotion.Android.csproj \
            -c Release \
            -t:Package \
            -p:RuntimeIdentifier="$rid" \
            -p:RuntimeIdentifiers="$rid" \
            -p:ContinuousIntegrationBuild=true \
            -p:GitHubRefName="${GITHUB_REF_NAME}" \
            -p:ApplicationDisplayVersion="${{ steps.android_version.outputs.display_version }}" \
            -p:ApplicationVersion="${{ steps.android_version.outputs.version_code }}" \
            -p:Version="${{ steps.android_version.outputs.display_version }}" \
            -p:AndroidSdkDirectory="${ANDROID_SDK_ROOT}" \
            -p:JavaSdkDirectory="${JAVA_HOME}" \
            "${build_args[@]}"

          apk_search_root="src/Unlimotion.Android/bin/Release/net10.0-android/${rid}"
          apk_path="$(find "$apk_search_root" -type f -name '*-Signed.apk' | head -n 1)"
          if [ -z "$apk_path" ]; then
            echo "Signed APK not found for $rid under $apk_search_root" >&2
            exit 1
          fi

          case "$rid" in
            android-arm64) abi="arm64-v8a" ;;
            android-x64) abi="x86_64" ;;
            *)
              echo "Unexpected Android RID: $rid" >&2
              exit 1
              ;;
          esac

          validate_runtime_symbols "$apk_path" "$abi"

          asset_name="Unlimotion-${rid}.apk"
          if [ "${GITHUB_EVENT_NAME}" = "release" ]; then
            asset_name="Unlimotion-${GITHUB_REF_NAME}-${rid}.apk"
          fi

          cp "$apk_path" "artifacts/android/${asset_name}"
        done

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: unlimotion-android-apk
        path: artifacts/android/*.apk
        if-no-files-found: error

    - name: Upload APK To Release
      if: github.event_name == 'release'
      uses: softprops/action-gh-release@v1
      with:
        files: artifacts/android/*.apk
