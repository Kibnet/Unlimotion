name: Unlimotion debPkg

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to build and upload
        required: true
        type: string

permissions:
  contents: write

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  RELEASE_TAG: ${{ github.event.release.tag_name || github.event.inputs.tag || github.ref_name }}
  DOTNET_NUGET_SIGNATURE_VERIFICATION: "false"
  INSTALLER_PUBLISHER: Kibnet
  VELOPACK_VERSION: 0.0.1298
  LINUX_PUBLISH_DIR: ${{ github.workspace }}/src/Unlimotion.Desktop/bin/Release/net10.0/linux-x64/publish
  LINUX_VELOPACK_DIR: ${{ github.workspace }}/artifacts/velopack/linux

jobs:
  deb-build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        ref: ${{ env.RELEASE_TAG }}

    - name: Setup .NET 10 SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Normalize release version
      id: release_version
      shell: bash
      run: |
        version="${RELEASE_TAG}"
        version="${version#v}"

        if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
          echo "Release tag '${RELEASE_TAG}' cannot be used by the current Linux Velopack workflow. Use numeric SemVer tags like 1.2.3 or v1.2.3." >&2
          exit 1
        fi

        if [[ "$version" == "0.0.0" ]]; then
          echo "Release tag '${RELEASE_TAG}' cannot be used as a Velopack package version. Use 0.0.1 or greater." >&2
          exit 1
        fi

        echo "version=$version" >> "$GITHUB_OUTPUT"

    - name: Publish Linux Build
      run: >
        dotnet publish src/Unlimotion.Desktop/Unlimotion.Desktop.ForDebianBuild.csproj
        -c Release
        -f net10.0
        -r linux-x64
        -o "${{ env.LINUX_PUBLISH_DIR }}"
        -p:PublishSingleFile=true
        --self-contained true
        -p:IncludeNativeLibrariesForSelfExtract=true
        -p:DebugType=None
        -p:DebugSymbols=false
        -p:Version=${{ steps.release_version.outputs.version }}
        --ignore-failed-sources

    - name: Generate DebPkg
      run: sh ./src/Unlimotion.Desktop/ci/deb/generate-deb-pkg.sh ${{ steps.release_version.outputs.version }}

    - name: Rename DebPkg
      run: cd ./src/Unlimotion.Desktop/bin/Release/net*/linux-x64 && mv ./*.deb ./Unlimotion-${{ env.RELEASE_TAG }}.deb

    - name: Install Velopack CLI
      run: dotnet tool install --global vpk --version "${{ env.VELOPACK_VERSION }}" --ignore-failed-sources

    - name: Pack Velopack Linux Release
      shell: bash
      run: |
        mkdir -p "${{ env.LINUX_VELOPACK_DIR }}"

        "$HOME/.dotnet/tools/vpk" pack \
          --packId Unlimotion \
          --packVersion "${{ steps.release_version.outputs.version }}" \
          --packDir "${{ env.LINUX_PUBLISH_DIR }}" \
          --outputDir "${{ env.LINUX_VELOPACK_DIR }}" \
          --channel linux \
          --runtime linux-x64 \
          --mainExe Unlimotion.Desktop \
          --packTitle Unlimotion \
          --packAuthors "${{ env.INSTALLER_PUBLISHER }}" \
          --icon "${{ github.workspace }}/src/Unlimotion.Android/Icon.png"

    - name: Remove Existing Linux Release Assets
      if: ${{ github.event_name == 'workflow_dispatch' }}
      shell: bash
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        set -euo pipefail

        existing_assets="$(gh release view "$RELEASE_TAG" --repo "${{ github.repository }}" --json assets --jq '.assets[].name')"

        delete_asset() {
          local asset="$1"
          if grep -Fxq "$asset" <<< "$existing_assets"; then
            gh release delete-asset "$RELEASE_TAG" "$asset" --repo "${{ github.repository }}" --yes
          fi
        }

        delete_asset "releases.linux.json"
        delete_asset "assets.linux.json"
        delete_asset "Unlimotion-${{ steps.release_version.outputs.version }}-linux-full.nupkg"
        delete_asset "Unlimotion-${{ steps.release_version.outputs.version }}.deb"
        delete_asset "Unlimotion.AppImage"

    - name: Upload Velopack Linux Release
      shell: bash
      run: |
        "$HOME/.dotnet/tools/vpk" upload github \
          --outputDir "${{ env.LINUX_VELOPACK_DIR }}" \
          --channel linux \
          --repoUrl "https://github.com/${{ github.repository }}" \
          --token "${{ secrets.GITHUB_TOKEN }}" \
          --tag "${{ env.RELEASE_TAG }}" \
          --merge \
          --publish

    - name: Upload DebPkg To Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ env.RELEASE_TAG }}
        files: ./src/Unlimotion.Desktop/bin/Release/net*/linux-x64/Unlimotion-${{ env.RELEASE_TAG }}.deb
